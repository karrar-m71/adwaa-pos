name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run build

      - run: npx electron-builder --win --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            release
            dist
            out
            *.exe
